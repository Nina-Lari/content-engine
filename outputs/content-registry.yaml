# Content Registry
# Tracks article status for internal link resolution
#
# Usage:
#   1. When you publish an article to your blog, change its status to "published"
#   2. Run /finalize-links --all to update all _final.mdx files with working links
#
# Status values:
#   - planned: brief exists, article not yet written
#   - drafted: article written (_linked.md exists)
#   - published: live on blog, can be linked to

