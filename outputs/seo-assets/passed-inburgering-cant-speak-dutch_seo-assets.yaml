faqs:
  - question: "Is it normal to pass inburgering but not be able to speak Dutch?"
    answer: "Yes. It's common enough that many expats describe the same thing: a certificate in hand and a freeze in real conversation. The inburgering exam and most courses reward recognizing Dutch and giving memorized responses, and A2 is a low enough level that holding a spontaneous conversation isn't required to pass. Passing without speaking is a sign of how the system is built, not a sign that you failed."
  - question: "Why didn't passing the exam teach me to speak?"
    answer: "Because passing tests whether you can recognize Dutch and produce expected answers, not whether you can speak on the spot. Most self-paced courses count a lesson finished when you've clicked through the exercises, which trains recognition. Speaking is a separate skill that only builds when you actually produce the language in conversation, so the exam can be passed without that skill ever being developed."
  - question: "How do I learn to speak Dutch after passing inburgering?"
    answer: "Treat it as conversion, not starting over. Passing means you already recognize a lot of Dutch; the job now is turning that passive knowledge into speech. Produce daily even if it's imperfect, use words in real sentences and conversations rather than isolated lists, and practice with something that stays at your level and lets you make mistakes without switching to English. Pick a word you recognize but never say and use it in a real exchange today."
  - question: "Can you get Dutch citizenship without really speaking Dutch?"
    answer: "Yes, and that's exactly the gap many people feel. Because the exam is built around recognition and A2 is a modest bar, it's possible to hold the certificate, and even the passport, while still freezing in conversation. The certificate proves you passed a requirement; it doesn't prove you can converse. Closing that gap is a separate, doable task once the exam is behind you."

