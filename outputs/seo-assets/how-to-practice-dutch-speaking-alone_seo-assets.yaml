faqs:
  - question: "Can I learn to speak Dutch without a conversation partner?"
    answer: "Yes. Shadowing, self-talk, recording yourself, and AI conversation tools all build speaking ability without a human partner. Many learners make faster progress solo because they can practice daily and make mistakes without judgment."

  - question: "What is the shadowing technique for language learning?"
    answer: "Shadowing means listening to audio in your target language and speaking along simultaneously or with a slight delay. It trains pronunciation, rhythm, and the muscle memory of forming sounds."

  - question: "Can I use ChatGPT to practice Dutch speaking?"
    answer: "Yes. Set up specific scenarios, ask for corrections, and practice vocabulary in context. AI provides unlimited practice without judgment. For structured exam preparation, look for tools designed specifically for Dutch learning."

  - question: "How do I practice Dutch pronunciation alone?"
    answer: "Record yourself reading Dutch text aloud, then listen back. Compare your pronunciation to native audio. Shadowing Dutch podcasts also trains pronunciation through imitation."

  - question: "Why can't my Dutch partner help me practice?"
    answer: "Level mismatch makes practice difficult. Native speakers can't slow down enough or explain why things work the way they do. AI tools match your level and explain grammar without fatigue."

