faqs:
  - question: "How do I practice Dutch speaking without a partner?"
    answer: "Use methods that force you to produce Dutch out loud and give you feedback. The strongest is AI conversation practice, where a partner stays at your level and never switches to English. Add shadowing (repeating after short audio clips), recording yourself and reviewing it, writing sentences then saying them aloud, and narrating your day in Dutch. You do not need another person to build speaking ability, you need consistent production with correction."
  - question: "Can I learn to speak Dutch on my own?"
    answer: "Yes. Speaking is a skill you build by producing the language, not by adding more input. Solo methods that make you generate and review your own Dutch, especially AI conversation practice held at your level and recording yourself for review, build real speaking ability. The catch is that passive habits like watching Dutch TV build recognition, not speaking, so a solo routine has to be built around output."
  - question: "Is AI conversation good for Dutch speaking practice?"
    answer: "It is one of the best solo options because it is available anytime, never switches to English, and can be held at your exact level. A general tool like ChatGPT works if you tell it to stay at your level and you speak your answers out loud, but it has no structure, so you have to drive every session yourself. A guided course solves that by sequencing the practice and keeping the conversation inside vocabulary you have already learned."
  - question: "Why doesn't watching Dutch TV improve my speaking?"
    answer: "Watching Dutch TV builds recognition, which means understanding Dutch when you hear it. Speaking is a separate skill that only improves when you produce the language yourself. Most learners who feel stuck already understand far more than they can say, so adding more input does not close the gap. You have to practice producing Dutch out loud to get better at speaking it."
  - question: "What is the best way to practice Dutch at home?"
    answer: "Build a short daily routine around producing Dutch rather than consuming it. A workable week: narrate your day in Dutch and do five minutes of shadowing every day, then a few times a week have one AI conversation and record yourself once and review it. Consistency matters more than intensity, and output matters more than input."

