faqs:
  - question: "Is InburgeringOnline worth it?"
    answer: "Yes, if your goal is passing the inburgering exam efficiently. It's the most established online option, it's clearly mapped to the exam, it was founded by an NT2 (Dutch-as-a-second-language) teacher, and it has years of testimonials from people who passed all five parts. It's less of a fit if your priority is being able to hold conversations in Dutch after the exam is over."
  - question: "What is the best alternative to InburgeringOnline?"
    answer: "It depends on your goal. Dutchwithjoost is the alternative for people who want to speak Dutch after the exam and prefer a one-time price over a subscription. Inburgering.org is the alternative if your main concern is the cheapest possible option."
  - question: "Does InburgeringOnline teach you to speak Dutch?"
    answer: "It prepares you for the speaking part of the inburgering exam and now scores speaking with AI. At InburgeringOnline, speaking is one exam skill you practice toward the test, rather than the way each lesson is completed. That's the main difference from a course where a lesson only finishes once you've used the new words in a conversation."
  - question: "How much does InburgeringOnline cost?"
    answer: "InburgeringOnline is a monthly subscription. A full A2 package (all four language skills plus KNM) works out to about €210 on the 6-month plan or about €300 on the 12-month plan, with a no-commitment monthly option around €49.95 per month. The 'from €8.95/month' headline is the price of a single course on the 12-month plan, not the full exam package."
  - question: "Is InburgeringOnline a subscription or a one-time payment?"
    answer: "InburgeringOnline is a monthly subscription. Dutchwithjoost is a one-time payment of €399 that includes five-year access. If you'd rather pay once than pay monthly, that difference is worth weighing."
  - question: "Is Dutchwithjoost worth it if I need B1 for inburgering?"
    answer: "If you're starting from zero or close to it, yes. Dutchwithjoost builds the A1-to-A2 foundation that any B1 course assumes you already have, and a B1 course is coming soon. If you're already comfortable holding basic conversations at A2, your next step is a dedicated B1 course now."
