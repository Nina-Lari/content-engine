faqs:
  - question: "Is InburgeringOnline good for the inburgering exam?"
    answer: "Yes. InburgeringOnline has helped many people pass the A2 inburgering exam. It uses memorization and mock exams to prepare you for the test format. It works well if your primary goal is passing quickly."

  - question: "What is the difference between Dutchwithjoost and InburgeringOnline?"
    answer: "Both cover all five exam parts. The difference is how you learn. InburgeringOnline uses memorization and mock exams, optimizing for fast exam pass. Dutchwithjoost requires you to use each word in sentences before moving on, so you retain what you learn."

  - question: "Which inburgering course helps you actually use Dutch?"
    answer: "Dutchwithjoost requires you to produce the vocabulary (speak it, write it) as you learn it. Lessons complete when you can use the words, not when you finish exercises. InburgeringOnline focuses on memorization and recognition, which helps you pass but is harder to retain."

  - question: "Is Dutchwithjoost better than InburgeringOnline?"
    answer: "Neither is objectively better. InburgeringOnline is better for fast exam pass. Dutchwithjoost is better for retaining Dutch and using it after passing. The right choice depends on your goal."

  - question: "Which inburgering course is best for actually learning Dutch?"
    answer: "If retention is your goal, choose a course where completion means you can use the language, not that you finished exercises. Dutchwithjoost uses this criterion. Most memorization courses complete when you finish the content."

