faqs:
  - question: "Why can you pass the inburgering exam and still not speak Dutch?"
    answer: "Because passing and speaking are trained differently. The exam asks you to produce Dutch by speaking and writing, but most self-paced courses mark a lesson complete when you finish the exercises, which trains you to recognise the right answer rather than say it. You can click and memorise your way to a passing score and still freeze the first time someone actually talks to you in Dutch."

  - question: "Does the inburgering exam test speaking?"
    answer: "Yes. Speaking is one of the five parts of the A2 inburgering exam, alongside reading, listening, writing, and KNM (knowledge of Dutch society). That is exactly why a course that never makes you talk leaves a gap: the exam and real life both ask you to produce Dutch out loud, not just recognise it."

  - question: "Which inburgering courses include real speaking practice?"
    answer: "Private tutors give the most one-to-one speaking time but cost roughly 2,000 to 6,000 euro to reach A2. Classroom courses include speaking, but in a class of around 12 your share of talking time per session is small. Production-based self-paced courses build speaking into the lesson itself: the lesson is only complete once you have used the new words in a conversation."

  - question: "Is a classroom course better than a self-paced course for speaking?"
    answer: "It depends on your goals. A classroom gives you a human teacher, peers, and accountability, but it costs around 1,160 euro on average to A2, runs on a fixed schedule, and splits speaking time across a dozen students. A production-based self-paced course gives you unlimited speaking practice on your own schedule, which suits self-motivated learners who do not need peer pressure."

  - question: "How much does an inburgering course cost?"
    answer: "Self-paced courses range from under 150 euro for the budget options up to 300 to 600 euro for InburgeringOnline. Classroom courses average around 1,160 euro to A2, and private tutoring runs 2,000 to 6,000 euro. Dutchwithjoost is 399 euro one-time. Prices change, so check each provider before you buy."

