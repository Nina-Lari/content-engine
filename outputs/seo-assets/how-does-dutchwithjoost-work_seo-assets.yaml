title: "How Dutchwithjoost Works: A Lesson Walkthrough"
description: "A walkthrough of how Dutchwithjoost works: the curriculum, the two-phase lesson, the feedback from Joost, and why using the words beats memorizing them."
excerpt: "Most courses count a lesson done when you finish the exercises. Dutchwithjoost counts it done only when you've used the new words talking to Joost. Here's the whole loop, step by step."
