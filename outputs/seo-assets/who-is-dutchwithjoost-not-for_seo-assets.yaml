faqs:
  - question: "Is Dutchwithjoost right for me?"
    answer: "Dutchwithjoost is a strong fit if you're self-motivated, want to actually speak Dutch rather than just hold a certificate, need a flexible schedule, and have been let down by memorization-based courses. It's the wrong choice if your municipality assigns and funds your course (check your track first), if you can already hold basic conversations at an A2 level and need B1 right now, if you want the accountability of a classroom, if your budget is genuinely zero, or if all you want is to pass the exam and you already learn well by memorizing."
  - question: "Who should not use Dutchwithjoost?"
    answer: "Skip Dutchwithjoost if your municipality assigns and funds your integration course, since you'll usually need a provider from their approved list, so check your track first. Skip it too if you can already hold basic conversations at an A2 level and need B1 today (the course takes you up to A2, and a dedicated B1 course is on the way), if you want a teacher in the room and classmates holding you accountable, if you have no budget at all, or if all you want is to pass and you already learn well by memorizing. A beginner who will eventually need B1 is still a fit, since everyone learns A1 and A2 first."
  - question: "Is Dutchwithjoost better than a classroom course?"
    answer: "It depends on how you learn. If you're driven by in-person interaction, a teacher, and classmates expecting you, a classroom course is genuinely the better choice and we'd point you there. Dutchwithjoost suits self-motivated learners who want to practice speaking privately, on their own schedule, without waiting for a class to fit their week."
  - question: "Does Dutchwithjoost work if I'll eventually need B1?"
    answer: "Yes. The course takes a complete beginner from zero up to A2, and everyone passes through those levels first, so a beginner who will eventually need B1 is still a good fit. The only learners it doesn't suit on level are those who can already hold basic conversations at an A2 level and need B1 right now. A dedicated B1 course is on the way. Until it's out, those learners should use a separate B1 option."
